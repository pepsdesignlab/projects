<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>You've Got a Message!</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        canvas { display: block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

<script>
// --- DİNAMİK GÖRSEL AYARI ---
const urlParams = new URLSearchParams(window.location.search);
const userImage = urlParams.get('img'); // Linkteki ?img= parametresini okur

// Eğer linkte görsel yoksa gösterilecek varsayılan görsel
const defaultImage = 'https://picsum.photos/id/237/800/800'; 

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const sideLength = Math.min(window.innerWidth, window.innerHeight);

const config = {
    size: sideLength,
    minRadius: 3, 
    maxSplitLevel: 2, 
    animationSpeed: 0.15,
    imgSrc: userImage || defaultImage // Varsa kullanıcı görselini, yoksa varsayılanı kullan
};

let circles = [];
let imgData;
let splittingCircles = [];

canvas.width = config.size;
canvas.height = config.size;

class Circle {
    constructor(x, y, r, splitLevel = 0) {
        this.x = x;
        this.y = y;
        this.r = r;
        this.splitLevel = splitLevel;
        this.color = this.getColor(x, y);
        this.targetR = r;
        this.currentR = 0;
    }

    getColor(x, y) {
        if (!imgData) return '#fff';
        const ix = Math.floor((x / config.size) * config.size);
        const iy = Math.floor((y / config.size) * config.size);
        const index = (iy * config.size + ix) * 4;
        return `rgb(${imgData[index]}, ${imgData[index+1]}, ${imgData[index+2]})`;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0, this.currentR - 0.4), 0, Math.PI * 2); 
        ctx.fillStyle = this.color;
        ctx.fill();
    }

    update() {
        this.currentR += (this.targetR - this.currentR) * config.animationSpeed;
        if (Math.abs(this.targetR - this.currentR) < 0.1) this.currentR = this.targetR;
    }
}

const img = new Image();
img.crossOrigin = "Anonymous"; // Dışarıdan gelen resimlere erişim izni için şart!
img.src = config.imgSrc;

img.onload = () => {
    ctx.drawImage(img, 0, 0, config.size, config.size);
    imgData = ctx.getImageData(0, 0, config.size, config.size).data;
    ctx.clearRect(0, 0, config.size, config.size);
    
    const firstCircle = new Circle(config.size/2, config.size/2, config.size/2);
    firstCircle.currentR = firstCircle.targetR;
    circles.push(firstCircle);
    animate();
};

// Hata yönetimi: Görsel yüklenmezse (CORS hatası vb.)
img.onerror = () => {
    alert("Görsel yüklenemedi. Lütfen geçerli bir direkt resim linki kullanın.");
};

function animate() {
    ctx.clearRect(0, 0, config.size, config.size);
    circles.forEach(c => { c.update(); c.draw(); });
    for (let i = splittingCircles.length - 1; i >= 0; i--) {
        const c = splittingCircles[i];
        c.update();
        c.draw();
        if (c.currentR === c.targetR) {
            circles.push(c);
            splittingCircles.splice(i, 1);
        }
    }
    requestAnimationFrame(animate);
}

function handleInteraction(px, py) {
    for (let i = circles.length - 1; i >= 0; i--) {
        const c = circles[i];
        const dist = Math.hypot(px - c.x, py - c.y);
        if (dist < c.r && (c.r > config.minRadius || c.splitLevel < config.maxSplitLevel)) {
            const nr = c.r / 2;
            const nsLevel = c.splitLevel + 1;
            circles.splice(i, 1);
            splittingCircles.push(new Circle(c.x - nr, c.y - nr, nr, nsLevel));
            splittingCircles.push(new Circle(c.x + nr, c.y - nr, nr, nsLevel));
            splittingCircles.push(new Circle(c.x - nr, c.y + nr, nr, nsLevel));
            splittingCircles.push(new Circle(c.x + nr, c.y + nr, nr, nsLevel));
        }
    }
}

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    handleInteraction(e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    handleInteraction(touch.clientX - rect.left, touch.clientY - rect.top);
}, { passive: false });
</script>
</body>
</html>
